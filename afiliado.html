<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel Afiliado | 30k Drinks</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --azul: #00bfff;
        --dourado: #d4af37;
        --preto: #0a0a0a;
        --cinza: #1a1a1a;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Orbitron', sans-serif;
        background: linear-gradient(160deg, var(--preto), #121212);
        color: white;
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      /* HEADER com menu hamburger para mobile */
      header {
        background-color: var(--cinza);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.5rem;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      header h2 {
        color: var(--azul);
        font-size: 1.5rem;
      }

      #menu-toggle {
        display: none;
        flex-direction: column;
        cursor: pointer;
        width: 24px;
        height: 20px;
        justify-content: space-between;
      }

      #menu-toggle span {
        background-color: white;
        height: 3px;
        border-radius: 2px;
      }

      /* Navegação lateral */
      nav {
        background-color: var(--cinza);
        width: 240px;
        padding: 2rem 1rem;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        overflow-y: auto;
        transition: transform 0.3s ease-in-out;
        transform: translateX(0);
        z-index: 999;
      }

      nav.hidden {
        transform: translateX(-100%);
      }

      nav h2 {
        color: var(--azul);
        margin-bottom: 2rem;
        text-align: center;
      }

      nav ul {
        list-style: none;
      }

      nav ul li {
        margin: 1rem 0;
      }

      nav ul li a {
        color: white;
        text-decoration: none;
        padding: 0.5rem;
        display: block;
        border-radius: 6px;
        transition: background-color 0.3s;
      }

      nav ul li a:hover {
        background-color: var(--dourado);
        color: #000;
      }

      /* Conteúdo principal */
      .main {
        margin-left: 240px;
        padding: 2rem;
        width: 100%;
        transition: margin-left 0.3s ease-in-out;
      }

      .main h1 {
        margin-bottom: 2rem;
        color: var(--dourado);
        font-size: 1.8rem;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
      }

      .card {
        background-color: var(--cinza);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0, 191, 255, 0.1);
        transition: box-shadow 0.3s;
      }

      .card:hover {
        box-shadow: 0 0 25px rgba(0, 191, 255, 0.3);
      }

      .card h3 {
        color: var(--azul);
        margin-bottom: 0.5rem;
        font-size: 1.3rem;
      }

      .card p {
        font-size: 1.5rem;
        color: var(--dourado);
        font-weight: 700;
      }

      /* RESPONSIVO PARA CELULAR */

      @media (max-width: 768px) {
        nav {
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          width: 240px;
          transform: translateX(-100%);
          box-shadow: 2px 0 10px rgba(0, 0, 0, 0.7);
        }

        nav.show {
          transform: translateX(0);
        }

        .main {
          margin-left: 0;
          padding: 1rem 1rem 2rem 1rem;
        }

        .cards {
          grid-template-columns: 1fr;
        }

        #menu-toggle {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h2>30k Drinks</h2>
      <div id="menu-toggle" aria-label="Menu" tabindex="0" role="button">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </header>

    <nav id="sidebar" class="hidden" aria-label="Menu de navegação">
      <h2>30k Drinks</h2>
      <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Meus Pedidos</a></li>
        <li><a href="#">Cadastrar Pedido</a></li>
        <li><a href="#">Fiado</a></li>
        <li><a href="#">Clientes</a></li>
        <li><a href="#">Perfil</a></li>
      </ul>
    </nav>

    <main class="main" role="main">
      <h1>Bem-vindo, Ayano30k 🍷</h1>
      <section class="cards" aria-label="Resumo das vendas e dados">
        <article class="card" tabindex="0">
          <h3>Vendas do Mês</h3>
          <p>R$ 4.500</p>
        </article>
        <article class="card" tabindex="0">
          <h3>Comissão</h3>
          <p>R$ 540 / 54.000 RC</p>
        </article>
        <article class="card" tabindex="0">
          <h3>Pedidos</h3>
          <p>37</p>
        </article>
        <article class="card" tabindex="0">
          <h3>Estoque</h3>
          <p>23 produtos</p>
        </article>
      </section>
    </main>

    <script>
      const menuToggle = document.getElementById('menu-toggle');
      const sidebar = document.getElementById('sidebar');

      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('show');
      });

      // Acessibilidade para o menu via teclado
      menuToggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          sidebar.classList.toggle('show');
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
