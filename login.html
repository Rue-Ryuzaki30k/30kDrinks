<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | 30k Drinks</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(160deg, #0a0a0a, #111927);
        font-family: 'Orbitron', sans-serif;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .login-container {
        background: #1a1a1a;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0, 140, 255, 0.2);
        width: 320px;
      }

      .login-container h2 {
        text-align: center;
        color: #00bfff;
        margin-bottom: 1.5rem;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.3rem;
        color: #ccc;
      }

      .form-group input {
        width: 100%;
        padding: 0.7rem;
        border: none;
        border-radius: 8px;
        background-color: #2b2b2b;
        color: #fff;
      }

      .login-btn {
        width: 100%;
        padding: 0.8rem;
        display: block;
        text-align: center;
        background-color: #d4af37;
        border: none;
        border-radius: 8px;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .login-btn:hover {
        background-color: #ffce4b;
      }

      .register-link {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.9rem;
      }

      .register-link a {
        color: #00bfff;
        text-decoration: none;
      }

      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login 30k Drinks</h2>
      <form>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            placeholder="seuemail@exemplo.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="********" required />
        </div>
        <a href="afiliado.html" class="login-btn">Entrar</a>
      </form>
      <!--
        <div class="register-link">
        Não tem conta? <a href="#">Cadastre-se</a>
      </div>
     -->
    </div>
  </body>
</html>
