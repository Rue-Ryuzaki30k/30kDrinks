<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>30k Drinks - Início</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Orbitron', sans-serif;
        background: linear-gradient(to right, #000000, #0a0a0a);
        color: #f0f0f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 2rem;
        text-align: center;
        background: #000;
        border-bottom: 3px solid #30a0ff;
      }
      header h1 {
        font-size: 2.8rem;
        color: #30a0ff;
        text-shadow: 0 0 10px #30a0ff;
      }
      header p {
        font-size: 1.1rem;
        color: #ccc;
        margin-top: 0.5rem;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      main h2 {
        font-size: 2rem;
        color: #ffd700;
        margin-bottom: 1rem;
      }
      main p {
        font-size: 1.1rem;
        color: #ccc;
        max-width: 600px;
        margin-bottom: 2rem;
      }
      .btn {
        background: linear-gradient(to right, #30a0ff, #0077cc);
        color: white;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s;
        text-decoration: none;
      }
      .btn:hover {
        background: linear-gradient(to right, #0077cc, #30a0ff);
      }
      footer {
        text-align: center;
        padding: 1rem;
        font-size: 0.9rem;
        background: #111;
        color: #888;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>30k Drinks</h1>
      <p>Poder, luxo e bebida nas mãos da Máfia 30k 🍾</p>
    </header>
    <main>
      <h2>Bem-vindo à 30k Drinks</h2>
      <p>
        Aqui você encontra as melhores bebidas, participe de sorteios e compre
        fiado se for de confiança.
      </p>
      <a href="login.html" class="btn">Entrar no Sistema</a>
    </main>
    <footer>&copy; 2025 Máfia 30k. Desenvolvido por Yuki 30K 💙</footer>
  </body>
</html>
